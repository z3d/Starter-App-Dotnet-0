name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: '**/packages.lock.json'

    - name: Restore dependencies
      run: dotnet restore --force-evaluate

    - name: Verify formatting
      run: dotnet format --verify-no-changes --verbosity minimal --no-restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Unit tests
      run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName!~Integration"

  integration:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: '**/packages.lock.json'

    - name: Restore dependencies
      run: dotnet restore --force-evaluate

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Integration tests
      run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~Integration & Category!=Aspire"

  aspire:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: '**/packages.lock.json'

    - name: Trust ASP.NET Core dev cert
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y libnss3-tools
        dotnet dev-certs https --trust || true
        echo "SSL_CERT_DIR=$HOME/.aspnet/dev-certs/trust:/usr/lib/ssl/certs:/etc/ssl/certs" >> "$GITHUB_ENV"

    - name: Restore dependencies
      run: dotnet restore --force-evaluate

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Aspire tests
      run: dotnet test --no-build --configuration Release --verbosity normal --filter "Category=Aspire"

  docker-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build migrator image
      run: docker build -f src/StarterApp.DbMigrator/Dockerfile .

    - name: Build api image
      run: docker build -f src/StarterApp.Api/Dockerfile .

    - name: Build functions image
      run: docker build -f src/StarterApp.Functions/Dockerfile .
