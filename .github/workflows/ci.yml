name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Least privilege: every job only reads the repo (build/test/docker-build/artifact
# upload). Declaring this here overrides the repository's broader default GITHUB_TOKEN
# scopes, so compromised build-time code (NuGet packages, analyzers) cannot push commits,
# alter releases, or publish packages. Grant any future write need on the specific job.
permissions:
  contents: read

# Cancel superseded runs: a new push to a branch/PR cancels the prior run on that same
# ref, so rapid pushes don't pile up parallel runs of the expensive integration/Aspire
# (Testcontainers) and docker-build jobs. Keyed per-workflow-per-ref, so main and
# distinct PRs stay independent.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: '**/packages.lock.json'

    - name: Restore dependencies
      run: dotnet restore --locked-mode

    - name: Verify formatting
      run: dotnet format --verify-no-changes --verbosity minimal --no-restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Unit tests
      run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName!~Integration"

  integration:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: '**/packages.lock.json'

    - name: Restore dependencies
      run: dotnet restore --locked-mode

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Integration tests
      run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~Integration & Category!=Aspire"

  aspire:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: '**/packages.lock.json'

    - name: Trust ASP.NET Core dev cert
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y libnss3-tools
        dotnet dev-certs https --trust || true
        echo "SSL_CERT_DIR=$HOME/.aspnet/dev-certs/trust:/usr/lib/ssl/certs:/etc/ssl/certs" >> "$GITHUB_ENV"

    - name: Restore dependencies
      run: dotnet restore --locked-mode

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Aspire tests
      run: dotnet test --no-build --configuration Release --verbosity normal --filter "Category=Aspire"

  docker-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Build migrator image
      run: docker build -f src/StarterApp.DbMigrator/Dockerfile .

    - name: Build api image
      run: docker build -f src/StarterApp.Api/Dockerfile .

    - name: Build functions image
      run: docker build -f src/StarterApp.Functions/Dockerfile .
