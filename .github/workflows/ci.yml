name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: '**/packages.lock.json'

    - name: Restore dependencies
      run: dotnet restore --force-evaluate

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Unit tests
      run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName!~Integration"

  integration:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: '**/packages.lock.json'

    - name: Restore dependencies
      run: dotnet restore --force-evaluate

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Integration tests
      run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~Integration & Category!=Aspire"

  aspire:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: '**/packages.lock.json'

    - name: Restore dependencies
      run: dotnet restore --force-evaluate

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Aspire tests
      run: dotnet test --no-build --configuration Release --verbosity normal --filter "Category=Aspire"

  docker-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build migrator image
      run: docker compose build migrator

    - name: Build api image
      run: docker compose build api

    - name: Build functions image
      run: docker compose build functions
