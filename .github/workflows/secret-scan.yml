name: Secret Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Least privilege: the scan only reads the repo.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0   # full history so gitleaks scans every commit, not just the tip

    # The scanner is itself a supply-chain input, so we pin gitleaks to an exact version
    # and verify its SHA-256 before executing it — no floating release, no unpinned
    # marketplace action. This binary path is also license-free (gitleaks-action v2
    # requires GITLEAKS_LICENSE for org repos; the CLI does not).
    - name: Install gitleaks (checksum-verified)
      env:
        GITLEAKS_VERSION: 8.30.1
        GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
      run: |
        set -euo pipefail
        url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
        curl -sSfL "$url" -o gitleaks.tar.gz
        echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
        tar -xzf gitleaks.tar.gz gitleaks
        sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
        rm -f gitleaks.tar.gz gitleaks
        gitleaks version

    # --redact keeps any matched secret out of the build log. Non-zero exit on a finding
    # fails the job. Intentional placeholders are allowlisted in .gitleaks.toml.
    - name: Scan git history for secrets
      run: gitleaks git . --redact --no-banner --config .gitleaks.toml
