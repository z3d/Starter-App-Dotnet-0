name: DAST

# The OWASP ZAP active scan is bounded at ~20 min, which is too heavy to run on
# every PR. Run it nightly against main, plus on demand via workflow_dispatch.
on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      fail_risk:
        description: 'Gate threshold (High | Medium | Low)'
        required: false
        default: 'Medium'

# Least privilege: the scan only reads the repo and uploads an artifact, so the default
# GITHUB_TOKEN is narrowed to read. (Add security-events: write only if results are ever
# uploaded to GitHub code scanning as SARIF.)
permissions:
  contents: read

# Prevent overlapping scans (e.g. a manual dispatch during the nightly run); each ZAP
# active scan is ~20 min, so a superseded run is cancelled rather than run in parallel.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dast:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: '**/packages.lock.json'

    - name: Restore dependencies
      run: dotnet restore --locked-mode

    # Boots a throwaway PostgreSQL + the API, runs the OWASP ZAP scan, and fails
    # the job on any alert at or above FAIL_RISK. Docker and jq are preinstalled
    # on ubuntu-latest. See dast/README.md.
    - name: OWASP ZAP DAST scan
      run: dast/run-dast.sh
      env:
        FAIL_RISK: ${{ github.event.inputs.fail_risk || 'Medium' }}

    - name: Upload DAST reports
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: dast-reports
        path: |
          dast/reports/dast-report.html
          dast/reports/dast-report.json
          dast/reports/api.log
          dast/reports/zap-autorun.log
        if-no-files-found: ignore
