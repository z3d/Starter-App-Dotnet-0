services:
  migrator:
    build:
      context: .
      dockerfile: src/StarterApp.DbMigrator/Dockerfile
    environment:
      - ConnectionStrings__database=Server=db;Database=StarterApp;User Id=sa;Password=Your_password123;TrustServerCertificate=True;
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend-network

  api:
    build:
      context: .
      dockerfile: src/StarterApp.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ConnectionStrings__database=Server=db;Database=StarterApp;User Id=sa;Password=Your_password123;TrustServerCertificate=True;
      - ConnectionStrings__redis=redis:6379
      - ConnectionStrings__servicebus=Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;
      - ConnectionStrings__payloadarchive=UseDevelopmentStorage=true;DevelopmentStorageProxyUri=http://azurite
      - PayloadCapture__RequireArchiveStore=true
      - PayloadCapture__FailureMode=FailClosed
      - SEQ_URL=http://seq:5341
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      migrator:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      seq:
        condition: service_started
      redis:
        condition: service_healthy
      azurite:
        condition: service_healthy
      servicebus-emulator:
        condition: service_started
    networks:
      - backend-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
    restart: unless-stopped

  functions:
    build:
      context: .
      dockerfile: src/StarterApp.Functions/Dockerfile
    environment:
      - FUNCTIONS_WORKER_RUNTIME=dotnet-isolated
      - servicebus=Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;
      - AzureWebJobsStorage=UseDevelopmentStorage=true;DevelopmentStorageProxyUri=http://azurite
      - ConnectionStrings__payloadarchive=UseDevelopmentStorage=true;DevelopmentStorageProxyUri=http://azurite
      - PayloadCapture__RequireArchiveStore=true
      - PayloadCapture__FailureMode=FailClosed
      - PayloadCapture__CleanupCron=0 0 * * * *
    depends_on:
      servicebus-emulator:
        condition: service_started
      azurite:
        condition: service_healthy
    networks:
      - backend-network
    restart: unless-stopped

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net'); const s=net.connect(10000,'127.0.0.1').on('connect',()=>{s.destroy();process.exit(0);}).on('error',()=>process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
    restart: unless-stopped

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Your_password123
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Your_password123" -C -Q "SELECT 1" -b
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend-network
    restart: unless-stopped

  sqledge:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Your_password123
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.create_connection(('localhost',1433),1); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - backend-network

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Your_password123
      - SQL_SERVER=sqledge
    volumes:
      - ./config/servicebus-emulator.json:/ServiceBus_Emulator/ConfigFiles/Config.json
    ports:
      - "5672:5672"
    depends_on:
      sqledge:
        condition: service_healthy
    networks:
      - backend-network

  seq:
    image: datalust/seq:latest
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    ports:
      - "5341:80"
    volumes:
      - seq-data:/data
    networks:
      - backend-network
    restart: unless-stopped

networks:
  backend-network:
    driver: bridge

volumes:
  sqldata:
    driver: local
  redis-data:
    driver: local
  seq-data:
    driver: local
  azurite-data:
    driver: local
